<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard สรุปปริมาณจราจร จ.ขอนแก่น</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { margin: 0; color: var(--primary-color); font-size: 24px; }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .card h3 { margin: 0; font-size: 14px; color: #7f8c8d; font-weight: 400; }
        .card p { margin: 10px 0 0; font-size: 28px; font-weight: 600; color: var(--accent-color); }

        /* Chart Section */
        .chart-container {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            height: 450px;
        }

        /* Table Section */
        .table-container {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        th { background-color: #fafafa; color: #7f8c8d; font-weight: 600; }
        tr:hover { background-color: #f9f9f9; }

        .btn-map {
            text-decoration: none;
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-map:hover { opacity: 0.8; }

        @media (max-width: 600px) {
            .chart-container { height: 350px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Dashboard ปริมาณจราจรขอนแก่น</h1>
            <a href="index.html" class="btn-map">กลับไปหน้าแผนที่</a>
        </header>

        <div class="summary-grid">
            <div class="card">
                <h3>จำนวนจุดที่สำรวจ</h3>
                <p id="total-points">-</p>
            </div>
            <div class="card">
                <h3>ปริมาณรถรวม (คัน/ชม.)</h3>
                <p id="total-cars">-</p>
            </div>
            <div class="card">
                <h3>ค่าเฉลี่ยความหนาแน่น</h3>
                <p id="avg-cars">-</p>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="trafficChart"></canvas>
        </div>

        <div class="table-container">
            <h3>รายละเอียดข้อมูลรายจุด</h3>
            <table id="data-table">
                <thead>
                    <tr>
                        <th>ชื่อจุดนับรถ</th>
                        <th>ปริมาณรถ (คัน/ชม.)</th>
                        <th>พิกัด (Lat, Long)</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTBl_7t5r5vFUW_QbxVF4h2FxfAaPP7vdGvXEsJ8kMxAZ0wZHlM42KPCCnjq0yTlXSyaPs1-kpyy8GP/pub?gid=2023562744&single=true&output=csv';

        Papa.parse(csvUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            transformHeader: h => h.trim().toLowerCase(),
            complete: function(results) {
                const data = results.data;
                
                // 1. เตรียมข้อมูล
                let labels = [];
                let values = [];
                let total = 0;

                // กรองข้อมูลและแปลงตัวเลข
                const processedData = data.map(row => {
                    const name = row['name'] || row['location'] || row['title'] || "ไม่ระบุชื่อ";
                    const cars = parseFloat(String(row['cars']).replace(/,/g, '')) || 0;
                    return { name, cars, lat: row['lat'], lng: row['lag'] || row['long'] };
                }).sort((a, b) => b.cars - a.cars); // เรียงจากมากไปน้อย

                // 2. คำนวณค่าทางสถิติ
                processedData.forEach(item => {
                    labels.push(item.name);
                    values.push(item.cars);
                    total += item.cars;

                    // เพิ่มแถวในตาราง
                    const rowHtml = `<tr>
                        <td><b>${item.name}</b></td>
                        <td style="color:#3498db; font-weight:600;">${item.cars.toLocaleString()}</td>
                        <td style="font-size:12px; color:#95a5a6;">${item.lat}, ${item.lng}</td>
                    </tr>`;
                    document.querySelector('#data-table tbody').innerHTML += rowHtml;
                });

                // แสดงผลการ์ดสรุป
                document.getElementById('total-points').innerText = processedData.length.toLocaleString();
                document.getElementById('total-cars').innerText = total.toLocaleString();
                document.getElementById('avg-cars').innerText = Math.round(total / processedData.length).toLocaleString();

                // 3. สร้างกราฟด้วย Chart.js
                const ctx = document.getElementById('trafficChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'ปริมาณรถ (คันต่อชั่วโมง)',
                            data: values,
                            backgroundColor: 'rgba(52, 152, 219, 0.7)',
                            borderColor: 'rgba(52, 152, 219, 1)',
                            borderWidth: 1,
                            borderRadius: 5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            title: {
                                display: true,
                                text: 'การเปรียบเทียบปริมาณรถในแต่ละจุด (เรียงจากมากไปน้อย)',
                                font: { family: 'Prompt', size: 16 }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { font: { family: 'Prompt' } }
                            },
                            x: {
                                ticks: { font: { family: 'Prompt' }, maxRotation: 45, minRotation: 45 }
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
