<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผนที่แสดงความหนาแน่นการจราจร จ.ขอนแก่น</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }
        
        /* ตกแต่งกล่องข้อความ Pop-up */
        .leaflet-popup-content-wrapper {
            border-radius: 12px;
            overflow: hidden;
        }

        /* ลบพื้นหลังสีขาวเริ่มต้นของ divIcon ออก */
        .custom-pin-container {
            background: none;
            border: none;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>

    <script>
        // 1. ศูนย์กลาง จ.ขอนแก่น
        var map = L.map('map').setView([16.4322, 102.8236], 12);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTBl_7t5r5vFUW_QbxVF4h2FxfAaPP7vdGvXEsJ8kMxAZ0wZHlM42KPCCnjq0yTlXSyaPs1-kpyy8GP/pub?gid=2023562744&single=true&output=csv';

        // 2. ฟังก์ชันกำหนดสีแบบไล่ระดับ (Gradient)
        function getColor(cars) {
            if (cars >= 3000) return '#FF0000'; // แดง (3000 ขึ้นไป)
            if (cars >= 2500) return '#FF4500'; // แดงอมส้ม
            if (cars >= 2000) return '#FFA500'; // ส้ม (ใกล้ 2000)
            if (cars >= 1500) return '#FFD700'; // เหลือง
            if (cars >= 1000) return '#32CD32'; // เขียวอ่อน (ใกล้ 1000)
            return '#008000';                   // เขียวเข้ม (น้อยกว่า 1000)
        }

        Papa.parse(csvUrl, {
            download: true,
            header: true, 
            skipEmptyLines: true,
            transformHeader: function(header) {
                return header.trim().toLowerCase();
            },
            complete: function(results) {
                var data = results.data;
                var heatPoints = []; // ตัวแปรสำหรับเก็บข้อมูลพิกัดและความเข้มของ Heatmap
                
                data.forEach(function(row) {
                    var lat = parseFloat(row['lat']); 
                    var lng = parseFloat(row['lag'] || row['long']); 
                    
                    var rawCars = row['cars'] ? String(row['cars']).replace(/,/g, '') : "0";
                    var carsPerHour = parseFloat(rawCars);
                    var videoUrl = row['link'] || row['url'] || ""; 

                    if (!isNaN(lat) && !isNaN(lng)) {
                        
                        var fillColor = getColor(carsPerHour);

                        // 3. เก็บข้อมูลใส่ใน Array สำหรับทำ Heatmap
                        // เก็บแบบ: [ละติจูด, ลองจิจูด, ความเข้ม/จำนวนรถ]
                        heatPoints.push([lat, lng, carsPerHour]);

                        // 4. สร้าง HTML สำหรับหมุดที่มีตัวเลขอยู่ตรงกลาง
                        var iconHtml = `
                            <div style="
                                background-color: ${fillColor};
                                width: 45px;
                                height: 45px;
                                border-radius: 50%;
                                border: 2.5px solid white;
                                color: white;
                                font-size: 11px;
                                font-weight: bold;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                box-shadow: 0 3px 6px rgba(0,0,0,0.5);
                            ">${carsPerHour.toLocaleString()}</div>
                        `;

                        // สร้าง Custom Icon 
                        var customIcon = L.divIcon({
                            html: iconHtml,
                            className: 'custom-pin-container', // อ้างอิงจาก CSS ด้านบน
                            iconSize: [45, 45],
                            iconAnchor: [22.5, 22.5], // ให้จุดศูนย์กลางอยู่ตรงกลางวงกลม
                            popupAnchor: [0, -22] // ให้ Pop-up เด้งเหนือวงกลมเล็กน้อย
                        });

                        // นำ Custom Icon ไปใส่เป็นหมุดบนแผนที่
                        var marker = L.marker([lat, lng], {icon: customIcon}).addTo(map);

                        // 5. จัดการลิงก์วิดีโอ (เล่นอัตโนมัติ ซ่อนเมนู)
                        var embedUrl = "";
                        if (videoUrl) {
                            if (videoUrl.includes("youtu.be/")) {
                                embedUrl = videoUrl.replace("youtu.be/", "www.youtube.com/embed/");
                            } else if (videoUrl.includes("watch?v=")) {
                                embedUrl = videoUrl.replace("watch?v=", "embed/");
                            } else {
                                embedUrl = videoUrl; 
                            }
                            
                            if (embedUrl.includes("youtube.com")) {
                                var separator = embedUrl.includes("?") ? "&" : "?";
                                embedUrl += separator + "autoplay=1&mute=1&controls=0&modestbranding=1&loop=1";
                            }
                        }

                        // สร้างหน้าต่าง Pop-up
                        var popupContent = `
                            <div style="text-align: center;">
                                <div style="font-size: 16px; margin-bottom: 8px; color: #333;">
                                    <b>ปริมาณรถ: <span style="color: ${fillColor}; font-size: 18px;">${carsPerHour.toLocaleString()}</span> คัน/ชม.</b>
                                </div>
                                <iframe width="240" height="150" src="${embedUrl}" 
                                style="border-radius: 8px; pointer-events: none;" 
                                frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
                                </iframe>
                            </div>
                        `;
                        marker.bindPopup(popupContent, { minWidth: 260 });
                    }
                });

                // 6. สร้างชั้น Heatmap และดึงสีให้ตรงกับ Pin (3000 คือจุด Max)
                if (heatPoints.length > 0) {
                    var heat = L.heatLayer(heatPoints, {
                        radius: 50,    // ขนาดการกระจายของวงความร้อน
                        blur: 30,      // ความเบลอของขอบ
                        maxZoom: 14,   // ระดับการซูมที่จะเห็นความร้อนชัดสุด
                        max: 3000,     // ตั้งค่าจุดอิ่มตัวสูงสุดที่ 3000 คัน
                        gradient: {    // ตั้งระดับสี (0.0 ถึง 1.0) ให้สอดคล้องกับ getColor
                            0.33: '#008000',  // ~1000 คัน (เขียว)
                            0.50: '#32CD32',  // ~1500 คัน (เขียวอ่อน)
                            0.66: '#FFD700',  // ~2000 คัน (เหลือง/ส้มอ่อน)
                            0.83: '#FFA500',  // ~2500 คัน (ส้ม)
                            1.0: '#FF0000'    // 3000 คันขึ้นไป (แดง)
                        }
                    }).addTo(map);
                }
            },
            error: function(err) {
                console.error("เกิดข้อผิดพลาดในการโหลดไฟล์ CSV:", err);
            }
        });
    </script>
</body>
</html>
