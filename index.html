<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผนที่แสดงความหนาแน่นการจราจร</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; }
        /* กำหนดขนาดแผนที่ให้เต็มหน้าจอ */
        #map { width: 100%; height: 100vh; }
        
        /* ตกแต่ง Popup */
        .popup-video { width: 100%; max-width: 250px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        // 1. ตั้งค่าเริ่มต้นของแผนที่ (กำหนดพิกัดศูนย์กลาง และระดับการซูม)
        // พิกัด 13.7563, 100.5018 คือกรุงเทพฯ (เปลี่ยนได้ตามพื้นที่เป้าหมาย)
        var map = L.map('map').setView([13.7563, 100.5018], 10);

        // 2. เรียกใช้แผนที่จาก OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 3. Link CSV จาก Google Sheets
        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTBl_7t5r5vFUW_QbxVF4h2FxfAaPP7vdGvXEsJ8kMxAZ0wZHlM42KPCCnjq0yTlXSyaPs1-kpyy8GP/pub?gid=2023562744&single=true&output=csv';

        // 4. ดึงข้อมูลและสร้างหมุด
        Papa.parse(csvUrl, {
            download: true,
            header: true, // บอกว่าแถวแรกคือชื่อคอลัมน์
            dynamicTyping: true, // แปลงตัวเลขให้เป็น Number อัตโนมัติ
            complete: function(results) {
                var data = results.data;

                data.forEach(function(row) {
                    // *** สำคัญ: เปลี่ยนชื่อคอลัมน์ด้านล่างให้ตรงกับใน Google Sheets ของคุณ ***
                    var lat = row.lat; // เปลี่ยน 'lat' เป็นชื่อหัวคอลัมน์ละติจูดใน Sheet
                    var lng = row.lag; // เปลี่ยน 'lag' เป็นชื่อหัวคอลัมน์ลองจิจูดใน Sheet
                    var carsPerHour = row.cars; // เปลี่ยน 'cars' เป็นชื่อหัวคอลัมน์จำนวนรถ
                    var videoUrl = row.video; // เปลี่ยน 'video' เป็นชื่อหัวคอลัมน์ลิงก์วิดีโอ

                    // ตรวจสอบว่ามีพิกัดถูกต้องหรือไม่ก่อนปักหมุด
                    if (lat && lng) {
                        
                        // 5. กำหนดสีหมุดตามจำนวนรถ (ตัวอย่าง: มากกว่า 100 สีแดง, น้อยกว่าหรือเท่ากับ 100 สีเขียว)
                        var markerColor = 'green';
                        var fillColor = '#28a745'; // สีเขียว

                        if (carsPerHour > 100) {
                            markerColor = 'red';
                            fillColor = '#dc3545'; // สีแดง
                        }

                        // สร้างหมุดแบบวงกลม (CircleMarker) เพราะสามารถเปลี่ยนสีได้อิสระง่ายกว่าไฟล์รูปภาพ
                        var marker = L.circleMarker([lat, lng], {
                            radius: 12,
                            fillColor: fillColor,
                            color: "#fff", // สีขอบ
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(map);

                        // 6. สร้าง Popup พร้อมวิดีโอ
                        var popupContent = `
                            <div style="text-align: center;">
                                <b>จำนวนรถ: ${carsPerHour} คัน/ชั่วโมง</b><br><br>
                                <video class="popup-video" controls autoplay muted loop>
                                    <source src="${videoUrl}" type="video/mp4">
                                    เบราว์เซอร์ของคุณไม่รองรับการแสดงวิดีโอ
                                </video>
                            </div>
                        `;
                        
                        marker.bindPopup(popupContent, { minWidth: 260 });
                    }
                });
                
                // หากต้องการให้แผนที่ซูมให้ครอบคลุมหมุดทั้งหมดอัตโนมัติ ให้เปิดคอมเมนต์โค้ดด้านล่าง
                /*
                var group = new L.featureGroup(map._layers);
                map.fitBounds(group.getBounds());
                */
            }
        });
    </script>
</body>
</html>
