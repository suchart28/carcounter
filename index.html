<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผนที่แสดงความหนาแน่นการจราจร</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; }
        /* กำหนดขนาดแผนที่ให้เต็มหน้าจอ */
        #map { width: 100%; height: 100vh; }
        
        /* ตกแต่ง Popup */
        .popup-video { width: 100%; max-width: 250px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

 <script>
        var map = L.map('map').setView([13.7563, 100.5018], 10);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        var csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTBl_7t5r5vFUW_QbxVF4h2FxfAaPP7vdGvXEsJ8kMxAZ0wZHlM42KPCCnjq0yTlXSyaPs1-kpyy8GP/pub?gid=2023562744&single=true&output=csv';

        Papa.parse(csvUrl, {
            download: true,
            header: true, 
            dynamicTyping: true, 
            complete: function(results) {
                var data = results.data;
                
                // ให้แสดงข้อมูลที่ดึงมาได้ในหน้าต่าง Console (F12)
                console.log("ดึงข้อมูลสำเร็จ! นี่คือข้อมูลจาก Sheet ของคุณ:", data);

                data.forEach(function(row, index) {
                    // *** สำคัญที่สุด: เปลี่ยนคำในวงเล็บเหลี่ยมให้ตรงกับหัวตารางใน Sheet ***
                    var lat = parseFloat(row['lat']); 
                    var lng = parseFloat(row['lag']); 
                    var carsPerHour = parseFloat(row['cars']); 
                    var videoUrl = row['video']; 

                    // เช็คว่าพิกัดเป็นตัวเลขที่ถูกต้องหรือไม่ก่อนปักหมุด
                    if (!isNaN(lat) && !isNaN(lng)) {
                        
                        var markerColor = 'green';
                        var fillColor = '#28a745'; 

                        if (carsPerHour > 100) {
                            markerColor = 'red';
                            fillColor = '#dc3545'; 
                        }

                        var marker = L.circleMarker([lat, lng], {
                            radius: 12,
                            fillColor: fillColor,
                            color: "#fff", 
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(map);

                        var popupContent = `
                            <div style="text-align: center;">
                                <b>จำนวนรถ: ${carsPerHour} คัน/ชั่วโมง</b><br><br>
                                <video class="popup-video" controls autoplay muted loop>
                                    <source src="${videoUrl}" type="video/mp4">
                                    เบราว์เซอร์ของคุณไม่รองรับ
                                </video>
                            </div>
                        `;
                        marker.bindPopup(popupContent, { minWidth: 260 });
                        
                        console.log(`ปักหมุดสำเร็จที่แถว ${index + 2}: พิกัด [${lat}, ${lng}]`);
                    } else {
                        console.warn(`ข้ามแถวที่ ${index + 2} ไป เนื่องจากพิกัด (lat/lag) ไม่ถูกต้องหรือไม่ใช่ตัวเลข`);
                    }
                });
            },
            error: function(err) {
                console.error("เกิดข้อผิดพลาดในการดึงไฟล์ CSV:", err);
            }
        });
    </script>
</body>
</html>
